<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Hub — ศูนย์รวมลิงก์มอนิเตอร์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg:#EDF1F7;
    --surface:#FFFFFF;
    --surface-2:#F4F7FC;
    --border:#E3E9F2;
    --text:#1F2633;
    --muted:#8B95A6;
    --accent:#4C7DF7;
    --accent-soft:#E4EBFE;
    --danger:#F16A6A;
    --radius:18px;
    --shadow:0 2px 10px rgba(30,50,90,.06);
    --shadow-lift:0 10px 26px rgba(30,50,90,.12);
    --font-main:'Prompt','Noto Sans Thai',system-ui,-apple-system,sans-serif;
    --font-mono:'Prompt','Noto Sans Thai',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-main);
    min-height:100vh;
  }
  .wrap{max-width:580px;margin:0 auto;padding:32px 16px 96px}

  /* ---------- header ---------- */
  header{text-align:center;margin-bottom:26px}
  .status-line{
    display:inline-flex;align-items:center;gap:8px;
    font-size:11px;letter-spacing:.14em;font-weight:500;
    color:var(--muted);text-transform:uppercase;margin-bottom:14px;
  }
  .led{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 4px var(--accent-soft);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @media (prefers-reduced-motion:reduce){.led{animation:none}}
  h1{font-size:27px;font-weight:700;letter-spacing:-.01em;cursor:text;border-radius:10px;padding:2px 10px;display:inline-block}
  .subtitle{color:var(--muted);font-size:14px;margin-top:6px;cursor:text;border-radius:10px;padding:2px 10px;display:inline-block}
  h1:focus,.subtitle:focus{outline:2px solid var(--accent);outline-offset:2px;background:var(--surface)}
  .hint{font-size:11px;color:#AEB7C6;margin-top:10px}
  .sync-badge{
    display:inline-block;font-size:11px;font-weight:500;margin-top:8px;
    color:#AEB7C6;background:var(--surface);border:1px solid var(--border);
    border-radius:99px;padding:3px 12px;
  }
  .sync-badge:empty{display:none}
  .sync-badge.ok{color:#2FA35C;border-color:#BFE6CD;background:#EDFAF2}
  .sync-badge.err{color:#D25555;border-color:#F2C9C9;background:#FDF1F1}

  /* ---------- business tabs ---------- */
  .biz-bar{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 12px;margin-bottom:6px;
    -webkit-overflow-scrolling:touch;scrollbar-width:none}
  .biz-bar::-webkit-scrollbar{display:none}
  .biz-tab{
    display:inline-flex;align-items:center;gap:7px;border:1px solid var(--border);
    background:var(--surface);color:var(--muted);border-radius:14px;padding:9px 15px;
    font-family:var(--font-main);font-size:14px;font-weight:600;cursor:pointer;
    white-space:nowrap;box-shadow:var(--shadow);transition:all .15s;flex-shrink:0;
  }
  .biz-tab:hover{color:var(--text)}
  .biz-tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .biz-tab.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .biz-tab.add{border-style:dashed;background:transparent;box-shadow:none;color:#AEB7C6}
  .biz-tab.add:hover{color:var(--accent);border-color:var(--accent)}
  .biz-n{font-size:11px;background:rgba(30,50,90,.07);border-radius:99px;padding:1px 8px;font-weight:600}
  .biz-tab.sel .biz-n{background:rgba(255,255,255,.25)}
  .biz-act{font-size:12px;opacity:.9;padding:2px 5px;border-radius:6px;cursor:pointer}
  .biz-tab.sel .biz-act:hover{background:rgba(255,255,255,.22)}
  .biz-tab.sel .biz-act.del:hover{background:rgba(255,120,120,.4)}

  /* ---------- toolbar ---------- */
  .toolbar{display:flex;gap:10px;margin-bottom:14px}
  .search{
    flex:1;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:11px 16px;color:var(--text);
    font-family:var(--font-main);font-size:14px;min-width:0;box-shadow:var(--shadow);
  }
  .search::placeholder{color:#AEB7C6}
  .search:focus{outline:2px solid var(--accent);outline-offset:-1px}
  .btn{
    border:1px solid var(--border);background:var(--surface);color:var(--text);
    border-radius:var(--radius);padding:11px 16px;font-family:var(--font-main);
    font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;
    transition:background .15s,border-color .15s,box-shadow .15s;box-shadow:var(--shadow);
  }
  .btn:hover{background:var(--surface-2)}
  .btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .btn-amber{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-amber:hover{background:#3D6EEB}
  .btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}

  /* ---------- filter chips ---------- */
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .chip{
    border:1px solid var(--border);background:var(--surface);color:var(--muted);
    border-radius:99px;padding:6px 15px;font-family:var(--font-main);
    font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;
  }
  .chip:hover{color:var(--text);border-color:#C7D2E4}
  .chip.sel{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* ---------- groups & cards ---------- */
  .group{margin-bottom:26px}
  .group-head{
    display:flex;align-items:center;gap:10px;margin-bottom:11px;padding:0 4px;
  }
  .group-name{
    font-size:12px;letter-spacing:.12em;font-weight:600;
    text-transform:uppercase;color:var(--muted);border-radius:8px;padding:2px 8px;
  }
  .group-name[contenteditable="true"]{cursor:text}
  .group-name:focus{outline:2px solid var(--accent);background:var(--surface);color:var(--text)}
  .group-line{flex:1;height:1px;background:#DDE4EF}
  .group-count{font-size:11px;font-weight:600;color:#AEB7C6}

  .list{display:flex;flex-direction:column;gap:12px}
  .card{
    position:relative;display:block;background:var(--surface);
    border:1px solid transparent;border-radius:var(--radius);
    padding:17px 18px 16px 20px;text-decoration:none;color:inherit;
    transition:transform .15s,border-color .15s,box-shadow .15s;
    overflow:hidden;box-shadow:var(--shadow);
  }
  .card:hover{transform:translateY(-2px);border-color:var(--c,var(--accent));box-shadow:var(--shadow-lift)}
  .card:focus-visible{outline:2px solid var(--c,var(--accent));outline-offset:2px}
  .card-top{display:flex;align-items:center;gap:11px}
  .dot{width:12px;height:12px;border-radius:50%;background:#fff;flex-shrink:0;
    border:3px solid var(--c,var(--accent))}
  .card-name{font-size:16px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card-note{color:var(--muted);font-size:13px;margin-top:5px;padding-left:23px}
  .card-domain{font-size:11px;color:#AEB7C6;margin-top:7px;padding-left:23px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .card{padding-right:62px}

  /* QR button (ท้ายการ์ด) */
  .qr-btn{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    width:38px;height:38px;border-radius:11px;border:1px solid var(--border);
    background:var(--surface-2);color:var(--muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:color .15s,border-color .15s,background .15s;
  }
  .qr-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  .qr-btn:focus-visible{outline:2px solid var(--accent)}
  .qr-btn svg{width:19px;height:19px}
  .manage-mode .qr-btn{display:none}

  /* QR modal */
  .qr-modal{max-width:340px;text-align:center}
  .qr-title{font-size:17px;font-weight:600;margin-bottom:2px;word-break:break-word}
  .qr-sub{font-size:12px;color:#AEB7C6;margin-bottom:18px;word-break:break-all}
  .qr-box{
    display:flex;align-items:center;justify-content:center;
    background:#fff;border:1px solid var(--border);border-radius:16px;
    padding:18px;margin:0 auto 18px;width:fit-content;
  }
  .qr-box img,.qr-box canvas{display:block}
  .qr-fail{font-size:13px;color:var(--muted);padding:20px;max-width:240px;word-break:break-all}

  /* manage controls */
  .controls{display:none;position:absolute;top:12px;right:12px;gap:6px}
  .manage-mode .controls{display:flex}
  .manage-mode .card{padding-right:158px}
  .icon-btn{
    width:32px;height:32px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface-2);color:var(--muted);cursor:pointer;font-size:14px;
    display:flex;align-items:center;justify-content:center;transition:color .15s,border-color .15s,background .15s;
    font-family:var(--font-main);
  }
  .icon-btn:hover{color:var(--text);border-color:#C7D2E4;background:#fff}
  .icon-btn.del:hover{color:var(--danger);border-color:var(--danger)}
  .icon-btn:focus-visible{outline:2px solid var(--accent)}

  /* drag & drop */
  .drag-handle{
    display:none;position:absolute;left:12px;top:50%;transform:translateY(-50%);
    width:30px;height:42px;border-radius:10px;border:1px solid var(--border);
    background:var(--surface-2);color:#AEB7C6;cursor:grab;touch-action:none;
    align-items:center;justify-content:center;font-size:15px;user-select:none;
  }
  .drag-handle:active{cursor:grabbing;color:var(--accent);border-color:var(--accent)}
  .manage-mode .drag-handle{display:flex}
  .manage-mode .card{padding-left:54px}
  .card.ghost{
    position:fixed;z-index:100;pointer-events:none;opacity:.95;
    transform:rotate(1.5deg);box-shadow:0 18px 44px rgba(30,50,90,.28);margin:0;
  }
  .card.drag-src{opacity:.45;border:1px dashed #C7D2E4;box-shadow:none}
  .is-dragging{user-select:none;-webkit-user-select:none}
  .is-dragging .card{transition:none}
  .is-dragging .card:hover{transform:none}

  /* ---------- empty / footer ---------- */
  .empty{
    text-align:center;padding:52px 20px;border:2px dashed #D6DEEA;
    border-radius:var(--radius);color:var(--muted);background:rgba(255,255,255,.5);
  }
  .empty p{font-size:14px;line-height:1.7}
  .empty .btn{margin-top:16px}
  footer{
    margin-top:36px;display:flex;justify-content:center;gap:18px;
  }
  footer button{
    background:none;border:none;color:#AEB7C6;font-family:var(--font-main);
    font-size:12px;cursor:pointer;padding:4px;
  }
  footer button:hover{color:var(--muted);text-decoration:underline}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(25,35,55,.38);backdrop-filter:blur(3px);
    display:none;align-items:flex-end;justify-content:center;z-index:50;padding:0;
  }
  .overlay.open{display:flex}
  .modal{
    background:var(--surface);
    border-radius:24px 24px 0 0;padding:26px 20px 30px;width:100%;max-width:580px;
    max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(30,50,90,.18);
  }
  .modal h2{font-size:18px;margin-bottom:18px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:500}
  .field input{
    width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:13px;
    padding:12px 15px;color:var(--text);font-family:var(--font-main);font-size:15px;
  }
  .field input:focus{outline:2px solid var(--accent);outline-offset:-1px;background:#fff}
  .field select{
    width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:13px;
    padding:12px 15px;color:var(--text);font-family:var(--font-main);font-size:15px;
  }
  .field select:focus{outline:2px solid var(--accent);outline-offset:-1px;background:#fff}
  .cat-suggest{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px}
  .cat-suggest button{
    border:1px solid var(--border);background:var(--surface-2);color:var(--muted);
    border-radius:99px;padding:5px 13px;font-size:12px;cursor:pointer;font-family:var(--font-main);
  }
  .cat-suggest button:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  .swatches{display:flex;gap:10px;flex-wrap:wrap}
  .swatch{
    width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;
    transition:transform .12s;box-shadow:inset 0 0 0 2px rgba(255,255,255,.6);
  }
  .swatch:hover{transform:scale(1.12)}
  .swatch.sel{border-color:var(--text)}
  .swatch:focus-visible{outline:2px solid var(--text);outline-offset:2px}
  .modal-actions{display:flex;gap:10px;margin-top:22px}
  .modal-actions .btn{flex:1}
  .form-err{color:var(--danger);font-size:13px;margin-top:10px;display:none}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:#2A3448;color:#fff;
    padding:11px 20px;border-radius:14px;font-size:14px;opacity:0;
    transition:transform .25s,opacity .25s;z-index:60;pointer-events:none;
    max-width:90vw;text-align:center;box-shadow:0 8px 24px rgba(30,50,90,.25);
  }
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}

  @media (min-width:560px){
    .overlay{align-items:center;padding:20px}
    .modal{border-radius:24px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="status-line"><span class="led"></span><span id="count-label">0 links · monitoring</span></div>
    <div><h1 id="title" contenteditable="true" spellcheck="false">Work Hub</h1></div>
    <div><span class="subtitle" id="subtitle" contenteditable="true" spellcheck="false">รวมทุกลิงก์ที่ต้องเช็กไว้ที่เดียว</span></div>
    <div class="hint">แตะที่ชื่อหรือคำอธิบายเพื่อแก้ไขได้เลย</div>
    <div><span class="sync-badge" id="sync-badge"></span></div>
  </header>

  <div class="biz-bar" id="biz-bar" aria-label="เลือกธุรกิจ"></div>

  <div class="toolbar">
    <input class="search" id="search" type="search" placeholder="ค้นหาลิงก์…" aria-label="ค้นหาลิงก์">
    <button class="btn" id="manage-btn">จัดการ</button>
    <button class="btn btn-amber" id="add-btn">+ เพิ่มลิงก์</button>
  </div>

  <div class="chips" id="chips"></div>

  <div id="groups"></div>

  <div class="empty" id="empty" hidden>
    <p>ยังไม่มีลิงก์ในบอร์ดนี้<br>เริ่มเพิ่มลิงก์แรกเพื่อรวมทุกอย่างไว้ที่เดียว</p>
    <button class="btn btn-amber" id="empty-add">+ เพิ่มลิงก์แรก</button>
  </div>

  <footer>
    <button id="sync-btn">☁ ซิงก์ Google Sheet</button>
    <button id="export-btn">⬇ สำรองข้อมูล (JSON)</button>
    <button id="import-btn">⬆ นำเข้าข้อมูล</button>
    <input type="file" id="import-file" accept="application/json" hidden>
  </footer>
</div>

<!-- sync modal -->
<div class="overlay" id="sync-overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="sync-modal-title">
    <h2 id="sync-modal-title">ซิงก์กับ Google Sheet</h2>
    <div class="field">
      <label for="f-sync-url">Web App URL (จาก Apps Script ที่ Deploy แล้ว)</label>
      <input id="f-sync-url" type="url" placeholder="https://script.google.com/macros/s/…/exec" inputmode="url">
    </div>
    <div class="field">
      <label for="f-sync-token">รหัสลับ (ต้องตรงกับ TOKEN ในสคริปต์)</label>
      <input id="f-sync-token" type="text" placeholder="รหัสที่ตั้งไว้ในสคริปต์" maxlength="80">
    </div>
    <div class="form-err" id="sync-err"></div>
    <div class="modal-actions">
      <button class="btn" id="sync-cancel-btn">ยกเลิก</button>
      <button class="btn" id="sync-off-btn">ปิดการซิงก์</button>
      <button class="btn btn-amber" id="sync-save-btn">เชื่อมต่อ</button>
    </div>
  </div>
</div>

<!-- modal -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <h2 id="modal-title">เพิ่มลิงก์</h2>
    <div class="field">
      <label for="f-name">ชื่อปุ่ม</label>
      <input id="f-name" type="text" placeholder="เช่น แดชบอร์ดยอดขาย" maxlength="60">
    </div>
    <div class="field">
      <label for="f-url">URL</label>
      <input id="f-url" type="url" placeholder="https://…" inputmode="url">
    </div>
    <div class="field">
      <label for="f-biz">ธุรกิจ / งาน</label>
      <select id="f-biz"></select>
    </div>
    <div class="field">
      <label for="f-cat">หมวดหมู่ (พิมพ์ชื่อใหม่เพื่อสร้างหมวด)</label>
      <input id="f-cat" type="text" placeholder="เช่น งาน, เซิร์ฟเวอร์, การเงิน" maxlength="30" list="cat-list">
      <datalist id="cat-list"></datalist>
      <div class="cat-suggest" id="cat-suggest"></div>
    </div>
    <div class="field">
      <label for="f-note">คำอธิบาย (ไม่บังคับ)</label>
      <input id="f-note" type="text" placeholder="เช่น เช็กทุกเช้า 9 โมง" maxlength="80">
    </div>
    <div class="field">
      <label>สีประจำปุ่ม</label>
      <div class="swatches" id="swatches"></div>
    </div>
    <div class="form-err" id="form-err"></div>
    <div class="modal-actions">
      <button class="btn" id="cancel-btn">ยกเลิก</button>
      <button class="btn btn-amber" id="save-btn">บันทึก</button>
    </div>
  </div>
</div>

<!-- biz modal -->
<div class="overlay" id="biz-overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="biz-modal-title">
    <h2 id="biz-modal-title">เพิ่มธุรกิจ</h2>
    <div class="field">
      <label for="f-biz-name">ชื่อธุรกิจ / งาน</label>
      <input id="f-biz-name" type="text" placeholder="เช่น ร้านเบเกอรี่, งานกราฟิก" maxlength="30">
    </div>
    <div class="form-err" id="biz-err"></div>
    <div class="modal-actions">
      <button class="btn" id="biz-cancel-btn">ยกเลิก</button>
      <button class="btn btn-amber" id="biz-save-btn">บันทึก</button>
    </div>
  </div>
</div>

<!-- qr modal -->
<div class="overlay" id="qr-overlay">
  <div class="modal qr-modal" role="dialog" aria-modal="true" aria-labelledby="qr-name">
    <div class="qr-title" id="qr-name"></div>
    <div class="qr-sub" id="qr-url"></div>
    <div class="qr-box" id="qr-box"></div>
    <div class="modal-actions">
      <button class="btn" id="qr-copy-btn">คัดลอกลิงก์</button>
      <button class="btn" id="qr-dl-btn">บันทึกรูป</button>
      <button class="btn btn-amber" id="qr-close-btn">ปิด</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';
  const COLORS = ['#4C7DF7','#22B8A8','#F59E4C','#8B5CF6','#F16A85','#58BE5B','#38A8E8','#94A3B8'];
  const KEY = 'linkhub-data-v2';
  const UNCAT = '';

  let state = {
    title: 'Work Hub',
    subtitle: 'รวมทุกลิงก์ที่ต้องเช็กไว้ที่เดียว',
    bizs: ['ธุรกิจของฉัน'],
    activeBiz: 'ธุรกิจของฉัน',
    links: []   // {id, name, url, note, color, cat, biz}
  };

  /* ย้ายข้อมูลเดิมให้เข้ากับระบบธุรกิจ (ลิงก์เก่าไม่หาย) */
  function migrate(){
    if(!Array.isArray(state.bizs)) state.bizs = [];
    state.bizs = state.bizs.map(b=>String(b).trim()).filter(Boolean);
    if(state.bizs.length===0) state.bizs = ['ธุรกิจของฉัน'];
    state.links.forEach(l=>{
      const b = (l.biz||'').trim();
      if(!b) l.biz = state.bizs[0];
      else if(!state.bizs.includes(b)) state.bizs.push(b);
    });
    if(!state.bizs.includes(state.activeBiz)) state.activeBiz = state.bizs[0];
  }
  let manageMode = false;
  let editingId = null;
  let selectedColor = COLORS[0];
  let activeFilter = null; // null = ทั้งหมด
  let storageOk = true;

  const $ = id => document.getElementById(id);
  const groupsEl=$('groups'), emptyEl=$('empty'), overlay=$('overlay'),
        searchEl=$('search'), toastEl=$('toast'), chipsEl=$('chips'),
        bizBar=$('biz-bar'), bizOverlay=$('biz-overlay');

  /* ---------- storage (localStorage) ---------- */
  function load(){
    try{
      const raw = localStorage.getItem(KEY);
      if(raw){
        const d = JSON.parse(raw);
        if(d && Array.isArray(d.links)) state = Object.assign(state, d);
      }
    }catch(e){ storageOk = false; }
    migrate();
  }
  function save(){
    state.updatedAt = Date.now();
    try{
      localStorage.setItem(KEY, JSON.stringify(state));
    }catch(e){
      if(storageOk){ storageOk=false; toast('บันทึกไม่สำเร็จ — พื้นที่เก็บข้อมูลของเบราว์เซอร์อาจเต็มหรือถูกปิดใช้งาน'); }
    }
    schedulePush();
  }

  /* ---------- Google Sheet sync ---------- */
  const SYNC_KEY = 'linkhub-sync';
  let sync = { url:'', token:'' };
  let syncTimer = null, syncBusy = false, pendingPush = false;

  function loadSyncCfg(){
    try{
      const r = localStorage.getItem(SYNC_KEY);
      if(r){ const d = JSON.parse(r); if(d && d.url) sync = { url:d.url, token:d.token||'' }; }
    }catch(e){}
  }
  function saveSyncCfg(){
    try{ localStorage.setItem(SYNC_KEY, JSON.stringify(sync)); }catch(e){}
  }
  function syncOn(){ return !!(sync.url && sync.token); }

  function setBadge(txt, cls){
    const b = $('sync-badge');
    b.textContent = txt || '';
    b.className = 'sync-badge' + (cls ? ' '+cls : '');
  }

  async function apiGet(){
    const u = sync.url + (sync.url.indexOf('?')>=0 ? '&' : '?') + 'token=' + encodeURIComponent(sync.token);
    const res = await fetch(u);
    return res.json();
  }
  async function apiPost(){
    const res = await fetch(sync.url, {
      method:'POST',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({ token: sync.token, state: state })
    });
    return res.json();
  }

  function schedulePush(){
    if(!syncOn()) return;
    setBadge('☁ กำลังซิงก์…');
    clearTimeout(syncTimer);
    syncTimer = setTimeout(pushNow, 1200);
  }
  async function pushNow(){
    if(!syncOn()) return;
    if(syncBusy){ pendingPush = true; return; }
    syncBusy = true;
    try{
      const r = await apiPost();
      if(r && r.ok) setBadge('☁ ซิงก์กับ Google Sheet แล้ว', 'ok');
      else setBadge('☁ ซิงก์ไม่สำเร็จ — เช็ก URL/รหัสลับ', 'err');
    }catch(e){
      setBadge('☁ ออฟไลน์ — จะซิงก์อัตโนมัติเมื่อบันทึกครั้งถัดไป', 'err');
    }
    syncBusy = false;
    if(pendingPush){ pendingPush = false; schedulePush(); }
  }

  async function initSync(){
    if(!syncOn()){ setBadge(''); return; }
    setBadge('☁ กำลังเชื่อมต่อ Google Sheet…');
    try{
      const r = await apiGet();
      if(!r || !r.ok){ setBadge('☁ เชื่อมต่อไม่ได้ — เช็ก URL/รหัสลับ', 'err'); return; }
      const remote = r.state;
      if(remote && Array.isArray(remote.links)){
        const ru = remote.updatedAt || 0, lu = state.updatedAt || 0;
        if(ru > lu){
          state = Object.assign(state, remote);
          migrate();
          render();
          toast('ดึงข้อมูลล่าสุดจาก Google Sheet แล้ว');
        }else if(lu > ru){
          schedulePush();
        }
        setBadge('☁ ซิงก์กับ Google Sheet แล้ว', 'ok');
      }else{
        // Sheet ยังว่าง — ส่งข้อมูลในเครื่องขึ้นไปตั้งต้น
        if(state.links.length > 0) await pushNow();
        else setBadge('☁ ซิงก์กับ Google Sheet แล้ว', 'ok');
      }
    }catch(e){
      setBadge('☁ ออฟไลน์ — ใช้ข้อมูลในเครื่องไปก่อน', 'err');
    }
  }

  /* ---------- helpers ---------- */
  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(()=>toastEl.classList.remove('show'), 2600);
  }
  function domain(url){
    try{ return new URL(url).hostname.replace(/^www\./,''); }catch(e){ return url; }
  }
  function normalizeUrl(u){
    u = u.trim();
    if(!u) return '';
    if(!/^https?:\/\//i.test(u)) u = 'https://' + u;
    try{ new URL(u); return u; }catch(e){ return ''; }
  }
  function esc(s){
    return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function categories(){
    const seen = [];
    state.links.forEach(l=>{
      if(l.biz !== state.activeBiz) return;
      const c = (l.cat||'').trim();
      if(c && !seen.includes(c)) seen.push(c);
    });
    return seen;
  }

  /* ---------- business tabs ---------- */
  function renderBizBar(){
    bizBar.innerHTML = '';
    state.bizs.forEach(b=>{
      const t = document.createElement('button');
      t.className = 'biz-tab' + (b===state.activeBiz?' sel':'');
      const nm = document.createElement('span'); nm.textContent = b; t.appendChild(nm);
      const n = state.links.filter(l=>l.biz===b).length;
      const cn = document.createElement('span'); cn.className='biz-n'; cn.textContent = n; t.appendChild(cn);
      if(manageMode && b===state.activeBiz){
        const e = document.createElement('span');
        e.className='biz-act'; e.textContent='✎'; e.title='เปลี่ยนชื่อธุรกิจ';
        e.onclick = ev=>{ ev.stopPropagation(); openBizModal('rename', b); };
        t.appendChild(e);
        if(state.bizs.length>1){
          const x = document.createElement('span');
          x.className='biz-act del'; x.textContent='✕'; x.title='ลบธุรกิจ';
          x.onclick = ev=>{ ev.stopPropagation(); deleteBiz(b); };
          t.appendChild(x);
        }
      }
      t.onclick = ()=>{
        if(state.activeBiz!==b){ state.activeBiz=b; activeFilter=null; render(); save(); }
      };
      bizBar.appendChild(t);
    });
    const add = document.createElement('button');
    add.className = 'biz-tab add';
    add.textContent = '+ ธุรกิจ';
    add.onclick = ()=>openBizModal('add');
    bizBar.appendChild(add);
  }

  function deleteBiz(b){
    const n = state.links.filter(l=>l.biz===b).length;
    if(n>0){ toast('ย้ายหรือลบลิงก์ในธุรกิจนี้ให้หมดก่อน (เหลือ '+n+' ลิงก์)'); return; }
    state.bizs = state.bizs.filter(x=>x!==b);
    if(state.activeBiz===b) state.activeBiz = state.bizs[0];
    toast('ลบธุรกิจ "'+b+'" แล้ว');
    render();
    save();
  }

  /* ---------- render ---------- */
  function render(){
    renderBizBar();
    const q = searchEl.value.trim().toLowerCase();
    const cats = categories();
    const bizLinks = state.links.filter(l=>l.biz===state.activeBiz);

    // filter chips
    chipsEl.innerHTML = '';
    if(cats.length > 0){
      const mk = (label, val)=>{
        const b = document.createElement('button');
        b.className = 'chip' + ((activeFilter===val)?' sel':'');
        b.textContent = label;
        b.onclick = ()=>{ activeFilter = (activeFilter===val)? null : val; render(); };
        chipsEl.appendChild(b);
      };
      mk('ทั้งหมด', null);
      cats.forEach(c=>mk(c, c));
      if(bizLinks.some(l=>!(l.cat||'').trim())) mk('ยังไม่จัดหมวด', UNCAT);
    }
    if(activeFilter !== null && activeFilter !== UNCAT && !cats.includes(activeFilter)) activeFilter = null;

    const match = l =>
      l.biz===state.activeBiz
      && (!q || l.name.toLowerCase().includes(q) || (l.note||'').toLowerCase().includes(q)
        || l.url.toLowerCase().includes(q) || (l.cat||'').toLowerCase().includes(q))
      && (activeFilter===null || (activeFilter===UNCAT ? !(l.cat||'').trim() : (l.cat||'').trim()===activeFilter));

    const items = state.links.filter(match);

    $('count-label').textContent = bizLinks.length + ' links · ' + cats.length + ' groups';
    $('title').textContent = state.title;
    $('subtitle').textContent = state.subtitle;
    emptyEl.hidden = bizLinks.length !== 0;
    document.body.classList.toggle('manage-mode', manageMode);

    // group items
    const order = [];
    const map = {};
    items.forEach(l=>{
      const c = (l.cat||'').trim();
      if(!(c in map)){ map[c]=[]; order.push(c); }
      map[c].push(l);
    });
    // จัดหมวดตามลำดับที่พบ แต่ให้ "ยังไม่จัดหมวด" อยู่ท้ายสุด
    order.sort((a,b)=> (a===''?1:0)-(b===''?1:0));

    groupsEl.innerHTML = '';
    order.forEach(cat=>{
      const g = document.createElement('div');
      g.className = 'group';
      g.dataset.cat = cat;
      const showHead = cat !== '' || order.length > 1;
      if(showHead){
        const head = document.createElement('div');
        head.className = 'group-head';
        const nameEl = document.createElement('span');
        nameEl.className = 'group-name';
        nameEl.textContent = cat === '' ? 'ยังไม่จัดหมวด' : cat;
        if(manageMode && cat !== ''){
          nameEl.contentEditable = 'true';
          nameEl.spellcheck = false;
          nameEl.title = 'พิมพ์เพื่อเปลี่ยนชื่อหมวด';
          nameEl.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); nameEl.blur(); } });
          nameEl.addEventListener('blur', ()=>{
            const nv = nameEl.textContent.trim();
            if(nv && nv !== cat){
              state.links.forEach(l=>{ if(l.biz===state.activeBiz && (l.cat||'').trim()===cat) l.cat = nv; });
              if(activeFilter===cat) activeFilter = nv;
              toast('เปลี่ยนชื่อหมวดเป็น "'+nv+'" แล้ว');
              save();
            }
            render();
          });
        }
        head.appendChild(nameEl);
        const line = document.createElement('div'); line.className='group-line';
        head.appendChild(line);
        const cnt = document.createElement('span'); cnt.className='group-count';
        cnt.textContent = map[cat].length;
        head.appendChild(cnt);
        g.appendChild(head);
      }

      const list = document.createElement('div');
      list.className = 'list';
      map[cat].forEach(l=>{
        const a = document.createElement('a');
        a.className = 'card';
        a.href = l.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.dataset.id = l.id;
        a.style.setProperty('--c', l.color);
        a.innerHTML =
          '<span class="drag-handle" title="ลากเพื่อจัดลำดับหรือย้ายหมวด" aria-hidden="true">⠿</span>'+
          '<div class="card-top"><span class="dot"></span><span class="card-name">'+esc(l.name)+'</span></div>'+
          (l.note ? '<div class="card-note">'+esc(l.note)+'</div>' : '')+
          '<div class="card-domain">'+esc(domain(l.url))+'</div>'+
          '<button class="qr-btn" data-qr="'+l.id+'" title="แสดง QR Code" aria-label="แสดง QR Code ของ '+esc(l.name)+'">'+
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><path d="M14 14h3v3h-3zM20 14h1M14 20h1M20 20h1M17 17h4v4"/></svg>'+
          '</button>'+
          '<div class="controls">'+
            '<button class="icon-btn" data-act="up" data-id="'+l.id+'" title="เลื่อนขึ้น" aria-label="เลื่อนขึ้น">↑</button>'+
            '<button class="icon-btn" data-act="down" data-id="'+l.id+'" title="เลื่อนลง" aria-label="เลื่อนลง">↓</button>'+
            '<button class="icon-btn" data-act="edit" data-id="'+l.id+'" title="แก้ไข" aria-label="แก้ไข">✎</button>'+
            '<button class="icon-btn del" data-act="del" data-id="'+l.id+'" title="ลบ" aria-label="ลบ">✕</button>'+
          '</div>';
        list.appendChild(a);
      });
      g.appendChild(list);
      groupsEl.appendChild(g);
    });

    if(items.length===0 && state.links.length>0){
      groupsEl.innerHTML = '<div class="empty"><p>ไม่พบลิงก์ที่ตรงกับเงื่อนไข</p></div>';
    }
  }

  /* ---------- modal ---------- */
  function buildSwatches(){
    const box = $('swatches');
    box.innerHTML = '';
    COLORS.forEach(c=>{
      const b = document.createElement('button');
      b.type='button';
      b.className = 'swatch' + (c===selectedColor?' sel':'');
      b.style.background = c;
      b.setAttribute('aria-label','สี '+c);
      b.onclick = ()=>{ selectedColor=c; buildSwatches(); };
      box.appendChild(b);
    });
  }
  function buildCatSuggest(){
    const cats = categories();
    const dl = $('cat-list');
    dl.innerHTML = cats.map(c=>'<option value="'+esc(c)+'">').join('');
    const box = $('cat-suggest');
    box.innerHTML = '';
    cats.forEach(c=>{
      const b = document.createElement('button');
      b.type='button';
      b.textContent = c;
      b.onclick = ()=>{ $('f-cat').value = c; };
      box.appendChild(b);
    });
  }
  function openModal(link){
    editingId = link ? link.id : null;
    $('modal-title').textContent = link ? 'แก้ไขลิงก์' : 'เพิ่มลิงก์';
    $('f-name').value = link ? link.name : '';
    $('f-url').value  = link ? link.url  : '';
    $('f-note').value = link ? (link.note||'') : '';
    $('f-cat').value  = link ? (link.cat||'') : (activeFilter && activeFilter!==UNCAT ? activeFilter : '');
    const sel = $('f-biz');
    sel.innerHTML = state.bizs.map(b=>'<option value="'+esc(b)+'">'+esc(b)+'</option>').join('');
    sel.value = link ? link.biz : state.activeBiz;
    selectedColor = link ? link.color : COLORS[state.links.length % COLORS.length];
    $('form-err').style.display='none';
    buildSwatches();
    buildCatSuggest();
    overlay.classList.add('open');
    setTimeout(()=>$('f-name').focus(), 60);
  }
  function closeModal(){ overlay.classList.remove('open'); }

  function submit(){
    const name = $('f-name').value.trim();
    const url  = normalizeUrl($('f-url').value);
    const note = $('f-note').value.trim();
    const cat  = $('f-cat').value.trim();
    const biz  = $('f-biz').value || state.activeBiz;
    const err = $('form-err');
    if(!name){ err.textContent='กรุณาใส่ชื่อปุ่ม'; err.style.display='block'; return; }
    if(!url){ err.textContent='URL ไม่ถูกต้อง — ลองใส่ในรูปแบบ https://example.com'; err.style.display='block'; return; }

    if(editingId){
      const l = state.links.find(x=>x.id===editingId);
      if(l){ l.name=name; l.url=url; l.note=note; l.cat=cat; l.biz=biz; l.color=selectedColor; }
      toast('แก้ไขลิงก์แล้ว');
    }else{
      state.links.push({ id:'l'+Date.now()+Math.floor(Math.random()*1000), name, url, note, cat, biz, color:selectedColor });
      toast('เพิ่ม "'+name+'" แล้ว');
    }
    closeModal();
    render();
    save();
  }

  /* ---------- events ---------- */
  $('add-btn').onclick   = ()=>openModal(null);
  $('empty-add').onclick = ()=>openModal(null);
  $('cancel-btn').onclick= closeModal;
  $('save-btn').onclick  = submit;
  overlay.addEventListener('click', e=>{ if(e.target===overlay) closeModal(); });

  /* ---------- biz modal ---------- */
  let bizMode = 'add', bizOld = '';
  function openBizModal(mode, old){
    bizMode = mode; bizOld = old || '';
    $('biz-modal-title').textContent = mode==='add' ? 'เพิ่มธุรกิจ' : 'เปลี่ยนชื่อธุรกิจ';
    $('f-biz-name').value = old || '';
    $('biz-err').style.display='none';
    bizOverlay.classList.add('open');
    setTimeout(()=>$('f-biz-name').focus(), 60);
  }
  function closeBizModal(){ bizOverlay.classList.remove('open'); }
  function submitBiz(){
    const name = $('f-biz-name').value.trim();
    const err = $('biz-err');
    if(!name){ err.textContent='กรุณาใส่ชื่อธุรกิจ'; err.style.display='block'; return; }
    if(state.bizs.includes(name) && name !== bizOld){
      err.textContent='มีธุรกิจชื่อนี้อยู่แล้ว'; err.style.display='block'; return;
    }
    if(bizMode==='add'){
      state.bizs.push(name);
      state.activeBiz = name;
      activeFilter = null;
      toast('เพิ่มธุรกิจ "'+name+'" แล้ว');
    }else{
      const i = state.bizs.indexOf(bizOld);
      if(i>=0) state.bizs[i] = name;
      state.links.forEach(l=>{ if(l.biz===bizOld) l.biz = name; });
      if(state.activeBiz===bizOld) state.activeBiz = name;
      toast('เปลี่ยนชื่อเป็น "'+name+'" แล้ว');
    }
    closeBizModal();
    render();
    save();
  }
  $('biz-cancel-btn').onclick = closeBizModal;
  $('biz-save-btn').onclick = submitBiz;
  bizOverlay.addEventListener('click', e=>{ if(e.target===bizOverlay) closeBizModal(); });

  /* ---------- QR code ---------- */
  const qrOverlay = $('qr-overlay');
  let qrLink = null;
  function openQr(l){
    qrLink = l;
    $('qr-name').textContent = l.name;
    $('qr-url').textContent = l.url;
    const box = $('qr-box');
    box.innerHTML = '';
    if(typeof QRCode !== 'undefined'){
      new QRCode(box, {
        text: l.url,
        width: 220,
        height: 220,
        colorDark: '#1F2633',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
    }else{
      box.innerHTML = '<div class="qr-fail">สร้าง QR ไม่ได้ (โหลดไลบรารีไม่สำเร็จ — เช็กอินเทอร์เน็ตแล้วรีเฟรช)<br><br>'+esc(l.url)+'</div>';
    }
    qrOverlay.classList.add('open');
  }
  function closeQr(){ qrOverlay.classList.remove('open'); qrLink = null; }
  $('qr-close-btn').onclick = closeQr;
  qrOverlay.addEventListener('click', e=>{ if(e.target===qrOverlay) closeQr(); });

  $('qr-dl-btn').onclick = ()=>{
    if(!qrLink) return;
    const box = $('qr-box');
    const img = box.querySelector('img');
    const canvas = box.querySelector('canvas');
    const src = (img && img.src) ? img.src : (canvas ? canvas.toDataURL('image/png') : null);
    if(!src){ toast('ยังไม่มีรูป QR ให้บันทึก'); return; }
    const a = document.createElement('a');
    a.href = src;
    a.download = 'qr-' + qrLink.name.replace(/[^\wก-๙-]+/g,'-').slice(0,40) + '.png';
    a.click();
    toast('บันทึกรูป QR แล้ว');
  };

  $('qr-copy-btn').onclick = async ()=>{
    if(!qrLink) return;
    try{
      await navigator.clipboard.writeText(qrLink.url);
      toast('คัดลอกลิงก์แล้ว');
    }catch(e){
      const t = document.createElement('textarea');
      t.value = qrLink.url;
      document.body.appendChild(t);
      t.select();
      try{ document.execCommand('copy'); toast('คัดลอกลิงก์แล้ว'); }
      catch(err){ toast('คัดลอกไม่สำเร็จ — กดค้างที่ลิงก์เพื่อคัดลอกเอง'); }
      t.remove();
    }
  };

  document.addEventListener('keydown', e=>{
    if(qrOverlay.classList.contains('open')){
      if(e.key==='Escape') closeQr();
      return;
    }
    if(bizOverlay.classList.contains('open')){
      if(e.key==='Escape') closeBizModal();
      if(e.key==='Enter' && e.target.tagName==='INPUT') submitBiz();
      return;
    }
    if(e.key==='Escape' && overlay.classList.contains('open')) closeModal();
    if(e.key==='Enter' && overlay.classList.contains('open') && e.target.tagName==='INPUT') submit();
  });

  $('manage-btn').onclick = function(){
    manageMode = !manageMode;
    this.classList.toggle('active', manageMode);
    this.textContent = manageMode ? 'เสร็จสิ้น' : 'จัดการ';
    render();
    if(manageMode) toast('ลากที่ ⠿ เพื่อจัดลำดับ หรือย้ายไปหมวดอื่นได้เลย');
  };

  searchEl.addEventListener('input', render);

  groupsEl.addEventListener('click', e=>{
    if(e.target.closest('.drag-handle')){ e.preventDefault(); return; }
    const qb = e.target.closest('.qr-btn');
    if(qb){
      e.preventDefault(); e.stopPropagation();
      const l = state.links.find(x=>x.id===qb.dataset.qr);
      if(l) openQr(l);
      return;
    }
    const btn = e.target.closest('[data-act]');
    if(!btn) return;
    e.preventDefault(); e.stopPropagation();
    const id = btn.dataset.id;
    const i = state.links.findIndex(l=>l.id===id);
    if(i<0) return;
    const act = btn.dataset.act;
    const cat = (state.links[i].cat||'').trim();
    if(act==='del'){
      const name = state.links[i].name;
      state.links.splice(i,1);
      toast('ลบ "'+name+'" แล้ว');
    }else if(act==='up' || act==='down'){
      // สลับตำแหน่งกับลิงก์ข้างเคียง "ในหมวดเดียวกัน"
      const dir = act==='up' ? -1 : 1;
      let j = i + dir;
      while(j>=0 && j<state.links.length && (state.links[j].cat||'').trim()!==cat) j += dir;
      if(j>=0 && j<state.links.length){
        [state.links[i],state.links[j]] = [state.links[j],state.links[i]];
      }
    }else if(act==='edit'){
      openModal(state.links[i]);
      return;
    }
    render();
    save();
  });

  /* ---------- drag & drop (เมาส์ + สัมผัส ผ่าน Pointer Events) ---------- */
  let drag = null;

  groupsEl.addEventListener('pointerdown', e=>{
    const handle = e.target.closest('.drag-handle');
    if(!handle || drag) return;
    const card = handle.closest('.card');
    if(!card) return;
    e.preventDefault();
    const rect = card.getBoundingClientRect();
    const ghost = card.cloneNode(true);
    ghost.classList.add('ghost');
    ghost.classList.remove('drag-src');
    ghost.style.width = rect.width+'px';
    ghost.style.left = rect.left+'px';
    ghost.style.top = rect.top+'px';
    document.body.appendChild(ghost);
    card.classList.add('drag-src');
    document.body.classList.add('is-dragging');
    drag = { card, ghost, dx:e.clientX-rect.left, dy:e.clientY-rect.top, y:e.clientY, raf:0 };
    try{ handle.setPointerCapture(e.pointerId); }catch(err){}
    autoScrollLoop();
  });

  function autoScrollLoop(){
    if(!drag) return;
    const m = 80, s = 13;
    if(drag.y < m) window.scrollBy(0,-s);
    else if(drag.y > window.innerHeight - m) window.scrollBy(0,s);
    drag.raf = requestAnimationFrame(autoScrollLoop);
  }

  document.addEventListener('pointermove', e=>{
    if(!drag) return;
    e.preventDefault();
    drag.y = e.clientY;
    drag.ghost.style.left = (e.clientX-drag.dx)+'px';
    drag.ghost.style.top  = (e.clientY-drag.dy)+'px';
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if(!el) return;
    const over = el.closest('.card');
    if(over && over !== drag.card && !over.classList.contains('ghost')){
      const r = over.getBoundingClientRect();
      const before = e.clientY < r.top + r.height/2;
      over.parentNode.insertBefore(drag.card, before ? over : over.nextSibling);
    }else{
      const grp = el.closest('.group');
      if(grp){
        const list = grp.querySelector('.list');
        if(list && !list.contains(drag.card)) list.appendChild(drag.card);
      }
    }
  }, {passive:false});

  function finishDrag(){
    if(!drag) return;
    cancelAnimationFrame(drag.raf);
    drag.ghost.remove();
    drag.card.classList.remove('drag-src');
    document.body.classList.remove('is-dragging');
    drag = null;
    commitDomOrder();
  }
  document.addEventListener('pointerup', finishDrag);
  document.addEventListener('pointercancel', finishDrag);

  /* อ่านลำดับใหม่จากหน้าจอ แล้วอัปเดตข้อมูลจริง
     (ลิงก์ที่ถูกกรองซ่อนอยู่ จะคงตำแหน่งเดิมของมันไว้) */
  function commitDomOrder(){
    const entries = [];
    groupsEl.querySelectorAll('.group').forEach(g=>{
      const cat = g.dataset.cat || '';
      g.querySelectorAll('.card[data-id]').forEach(c=>entries.push({ id:c.dataset.id, cat }));
    });
    const visSet = new Set(entries.map(en=>en.id));
    const idxs = [];
    state.links.forEach((l,i)=>{ if(visSet.has(l.id)) idxs.push(i); });
    if(idxs.length !== entries.length){ render(); return; }
    const byId = {};
    state.links.forEach(l=>{ byId[l.id]=l; });
    const placed = entries.map(en=>{
      const l = byId[en.id];
      if(l) l.cat = en.cat;
      return l;
    });
    placed.forEach((l,k)=>{ if(l) state.links[idxs[k]] = l; });
    render();
    save();
  }

  /* editable header */
  ['title','subtitle'].forEach(id=>{
    const el = $(id);
    el.addEventListener('blur', ()=>{
      const v = el.textContent.trim();
      if(v){ state[id]=v; save(); }
      else render();
    });
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
  });

  /* ---------- export / import ---------- */
  $('export-btn').onclick = ()=>{
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'linkhub-backup.json';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('ดาวน์โหลดไฟล์สำรองแล้ว');
  };
  $('import-btn').onclick = ()=>$('import-file').click();
  $('import-file').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const d = JSON.parse(reader.result);
        if(!d || !Array.isArray(d.links)) throw new Error('bad format');
        state = Object.assign({title:state.title, subtitle:state.subtitle, bizs:[], activeBiz:'', links:[]}, d);
        migrate();
        render();
        save();
        toast('นำเข้าข้อมูล '+state.links.length+' ลิงก์แล้ว');
      }catch(err){
        toast('ไฟล์ไม่ถูกต้อง — ต้องเป็นไฟล์สำรองจากหน้านี้เท่านั้น');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  /* ---------- sync settings modal ---------- */
  const syncOverlay = $('sync-overlay');
  $('sync-btn').onclick = ()=>{
    $('f-sync-url').value = sync.url;
    $('f-sync-token').value = sync.token;
    $('sync-err').style.display = 'none';
    syncOverlay.classList.add('open');
    setTimeout(()=>$('f-sync-url').focus(), 60);
  };
  function closeSyncModal(){ syncOverlay.classList.remove('open'); }
  $('sync-cancel-btn').onclick = closeSyncModal;
  syncOverlay.addEventListener('click', e=>{ if(e.target===syncOverlay) closeSyncModal(); });

  $('sync-off-btn').onclick = ()=>{
    sync = { url:'', token:'' };
    saveSyncCfg();
    setBadge('');
    closeSyncModal();
    toast('ปิดการซิงก์แล้ว — ข้อมูลยังอยู่ทั้งในเครื่องและใน Sheet');
  };

  $('sync-save-btn').onclick = async ()=>{
    const url = $('f-sync-url').value.trim();
    const token = $('f-sync-token').value.trim();
    const err = $('sync-err');
    if(!/^https:\/\/script\.google\.com\/macros\//.test(url)){
      err.textContent = 'URL ไม่ถูกต้อง — ต้องเป็นลิงก์ Web App จาก Apps Script (ขึ้นต้นด้วย https://script.google.com/macros/…)';
      err.style.display = 'block';
      return;
    }
    if(!token){
      err.textContent = 'กรุณาใส่รหัสลับให้ตรงกับ TOKEN ในสคริปต์';
      err.style.display = 'block';
      return;
    }
    sync = { url, token };
    saveSyncCfg();
    closeSyncModal();
    toast('บันทึกการตั้งค่าแล้ว กำลังเชื่อมต่อ…');
    await initSync();
  };

  /* ---------- init ---------- */
  loadSyncCfg();
  load();
  render();
  initSync();
})();
</script>
</body>
</html>
